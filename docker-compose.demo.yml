version: '3.8'

# Minimal stack for demos and interviews.
# No Kafka, no microservices — business data is seeded directly into ClickHouse.
#
# Services:
#   pgvector  — knowledge-agent only (pgvector for RAG document embeddings)
#   clickhouse — BiAgent analytical warehouse (all business queries go here)
#
# Usage:
#   docker-compose -f docker-compose.demo.yml up -d
#   npm run seed
#   npm run interactive

services:

  # ── pgvector ───────────────────────────────────────────────────────────────
  # Used exclusively by knowledge-agent for storing document embeddings.
  # BiAgent does NOT connect here.
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: biagent-pgvector
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-biagent}
      POSTGRES_USER:     ${POSTGRES_USER:-biagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biagent123}
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data

  # ── ClickHouse ─────────────────────────────────────────────────────────────
  # BiAgent analytical warehouse — all business queries go here.
  # In demo mode: seeded directly. In production: written to by Kafka consumer.
  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: biagent-clickhouse
    environment:
      CLICKHOUSE_DB:       ${CLICKHOUSE_DB:-biagent}
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER:-biagent}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-biagent123}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

volumes:
  pgvector-data:
  clickhouse-data:
