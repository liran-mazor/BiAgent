apiVersion: batch/v1
kind: Job
metadata:
  name: knowledge-ingest
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - until nc -z postgres-svc 5432; do echo waiting for postgres; sleep 3; done
      containers:
        - name: ingest
          image: biagent/knowledge:latest   # built from knowledge-agent/ Dockerfile
          command: ["tsx", "src/scripts/ingest.ts"]
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_HOST
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: OPENAI_API_KEY
            - name: COHERE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: COHERE_API_KEY
