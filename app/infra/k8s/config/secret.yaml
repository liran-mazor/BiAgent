apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
# Plain text — Kubernetes base64-encodes automatically on apply.
# DO NOT commit real values. Fill in before applying.
stringData:
  # Database
  POSTGRES_PASSWORD: biagent123
  CLICKHOUSE_PASSWORD: biagent123

  # Auth — signs user JWTs at signup; Kong verifies against its credential
  AUTH_SECRET: changeme

  # LLM APIs
  ANTHROPIC_API_KEY: changeme
  OPENAI_API_KEY: changeme
  COHERE_API_KEY: changeme

  # AWS (S3 chart upload + backoffice document storage)
  AWS_ACCESS_KEY_ID: changeme
  AWS_SECRET_ACCESS_KEY: changeme
  AWS_REGION: eu-north-1
  S3_BUCKET_NAME: changeme

  # Observability
  LANGSMITH_API_KEY: changeme
  LANGSMITH_PROJECT: BiAgent

---
# Kong JWT credential
# Kong requires its own Secret with specific fields — it cannot read AUTH_SECRET from above.
# K8s stringData has no cross-reference support, so the value is intentionally duplicated.
# !! When rotating: change AUTH_SECRET above AND secret: below to the same value !!
apiVersion: v1
kind: Secret
metadata:
  name: app-auth-credential
  labels:
    konghq.com/credential: jwt
stringData:
  key: app              # must match 'iss' claim in every token the auth service issues
  algorithm: HS256
  secret: changeme      # !! must equal AUTH_SECRET above !!
