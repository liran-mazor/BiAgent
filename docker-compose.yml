version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: agentiq-db
    environment:
      POSTGRES_USER: agentiq
      POSTGRES_PASSWORD: agentiq123
      POSTGRES_DB: agentiq
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: