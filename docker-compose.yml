version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentiq-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentiq}
      POSTGRES_USER: ${POSTGRES_USER:-agentiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentiq123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
