version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: agentiq-db
    environment:
      POSTGRES_USER: agentiq
      POSTGRES_PASSWORD: agentiq123
      POSTGRES_DB: agentiq
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: agentiq_cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped

volumes:
  postgres-data: